<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="ogTitle ogDesc">
  <title id="ogTitle">Eurisko — Consulenza SAP &amp; Business Process</title>
  <desc id="ogDesc">Logo Eurisko su sfondo navy dark con globo rosso a sinistra e testo a destra.</desc>

  <defs>
    <radialGradient id="glow" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#A01729" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#15253F"/>
    </linearGradient>
    <radialGradient id="globe" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C41E3A"/>
      <stop offset="60%" stop-color="#A01729"/>
      <stop offset="100%" stop-color="#6B0F1C"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative globe (left side) -->
  <g transform="translate(220, 315)">
    <circle r="160" fill="url(#globe)"/>
    <!-- Latitudes -->
    <ellipse cx="0" cy="0" rx="160" ry="48" fill="none" stroke="#F5F1E8" stroke-opacity="0.18" stroke-width="1.4"/>
    <ellipse cx="0" cy="0" rx="160" ry="100" fill="none" stroke="#F5F1E8" stroke-opacity="0.12" stroke-width="1.2"/>
    <!-- Meridian -->
    <line x1="0" y1="-160" x2="0" y2="160" stroke="#F5F1E8" stroke-opacity="0.18" stroke-width="1.4"/>
    <ellipse cx="0" cy="0" rx="48" ry="160" fill="none" stroke="#F5F1E8" stroke-opacity="0.18" stroke-width="1.4"/>
  </g>

  <!-- Brand mark / name -->
  <g transform="translate(470, 250)">
    <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="120" font-weight="600"
          fill="#F5F1E8" letter-spacing="-4">Eurisko</text>
    <text y="80" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="400"
          fill="#F5F1E8" letter-spacing="0">Consulenza SAP &amp; Business Process</text>
    <text y="160" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400"
          fill="#B8BDC9" letter-spacing="2">Cascinette d&apos;Ivrea (TO) · 2007</text>
  </g>

  <!-- Bottom marker -->
  <g transform="translate(470, 540)">
    <rect width="40" height="2" fill="#A01729"/>
    <text x="56" y="6" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500"
          fill="#F5F1E8" letter-spacing="3" text-transform="uppercase">euriskosrl.it</text>
  </g>
</svg>
